<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DiaMerna Admin</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#14141f;border:1px solid #2a2a3a;border-radius:16px;padding:32px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .card-wide{max-width:600px}
  h1{background:linear-gradient(135deg,#ff6b9d,#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:24px;margin-bottom:4px}
  .sub{color:#888;font-size:13px;margin-bottom:24px}
  label{display:block;font-size:12px;color:#999;margin-bottom:4px;margin-top:12px}
  input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a3a;background:#1a1a28;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
  input:focus{border-color:#b388ff}
  button{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:16px}
  .btn-primary{background:linear-gradient(135deg,#ff6b9d,#b388ff);color:#fff}
  .btn-primary:hover{opacity:.9}
  .error{color:#ff6b6b;font-size:13px;margin-top:8px;display:none}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .stat-card{background:#1a1a28;border:1px solid #2a2a3a;border-radius:12px;padding:20px;text-align:center}
  .stat-val{font-size:36px;font-weight:800;background:linear-gradient(135deg,#69f0ae,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-lbl{font-size:12px;color:#888;margin-top:4px}
  .logout-btn{background:transparent;border:1px solid #ff6b6b;color:#ff6b6b;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;margin-top:16px;width:auto}
  .logout-btn:hover{background:#ff6b6b22}
  .flex{display:flex;align-items:center;justify-content:space-between}
  .hidden{display:none}
</style>
</head>
<body>

<div id="loginCard" class="card">
  <h1>🔐 Admin Login</h1>
  <div class="sub">DiaMerna — Owner Panel</div>
  <label>Email</label>
  <input id="adminEmail" type="email" placeholder="admin@example.com" autocomplete="email">
  <label>Password</label>
  <input id="adminPass" type="password" placeholder="••••••••" autocomplete="current-password">
  <div id="adminError" class="error"></div>
  <button id="adminLoginBtn" class="btn-primary">Sign In</button>
  <div style="margin-top:16px;text-align:center"><a href="/" style="color:#888;font-size:12px;text-decoration:none">← Back to app</a></div>
</div>

<div id="dashCard" class="card card-wide hidden">
  <div class="flex">
    <div>
      <h1>📊 Admin Panel</h1>
      <div class="sub">DiaMerna — Owner Dashboard</div>
    </div>
    <button id="adminLogoutBtn" class="logout-btn">Logout</button>
  </div>
  <div id="statsContainer" class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statUsers">—</div>
      <div class="stat-lbl">👥 Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statDropbox">—</div>
      <div class="stat-lbl">☁️ Dropbox Connected</div>
    </div>
  </div>
  <div id="adminRefresh" style="text-align:center;margin-top:8px">
    <button id="adminRefreshBtn" style="background:none;border:none;color:#888;font-size:12px;cursor:pointer">🔄 Refresh</button>
  </div>
</div>

<script>
const loginCard = document.getElementById('loginCard')
const dashCard = document.getElementById('dashCard')
const adminEmail = document.getElementById('adminEmail')
const adminPass = document.getElementById('adminPass')
const adminError = document.getElementById('adminError')
const loginBtn = document.getElementById('adminLoginBtn')
const logoutBtn = document.getElementById('adminLogoutBtn')
const refreshBtn = document.getElementById('adminRefreshBtn')
const statUsers = document.getElementById('statUsers')
const statDropbox = document.getElementById('statDropbox')

let adminToken = localStorage.getItem('adminToken') || ''

function showLogin(msg) {
  loginCard.classList.remove('hidden')
  dashCard.classList.add('hidden')
  if (msg) { adminError.textContent = msg; adminError.style.display = 'block' }
}

function showDash() { loginCard.classList.add('hidden'); dashCard.classList.remove('hidden'); adminError.style.display = 'none' }

async function loadStats() {
  if (!adminToken) return
  statUsers.textContent = '⋯'; statDropbox.textContent = '⋯'
  try {
    const r = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + adminToken } })
    if (r.status === 401) { localStorage.removeItem('adminToken'); adminToken = ''; showLogin('Session expired'); return }
    const d = await r.json()
    statUsers.textContent = d.totalUsers
    statDropbox.textContent = d.dropboxConnections
  } catch { statUsers.textContent = '?'; statDropbox.textContent = '?' }
}

if (adminToken) { showDash(); loadStats() }

loginBtn.addEventListener('click', async () => {
  const email = adminEmail.value.trim(); const password = adminPass.value
  if (!email || !password) { adminError.textContent = 'Enter email and password'; adminError.style.display = 'block'; return }
  adminError.style.display = 'none'
  loginBtn.textContent = 'Signing in...'; loginBtn.disabled = true
  try {
    const r = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
    const d = await r.json()
    if (d.error) { adminError.textContent = d.error; adminError.style.display = 'block'; loginBtn.textContent = 'Sign In'; loginBtn.disabled = false; return }
    adminToken = d.token; localStorage.setItem('adminToken', adminToken)
    showDash(); loadStats()
    loginBtn.textContent = 'Sign In'; loginBtn.disabled = false
  } catch { adminError.textContent = 'Server unavailable'; adminError.style.display = 'block'; loginBtn.textContent = 'Sign In'; loginBtn.disabled = false }
})

logoutBtn.addEventListener('click', () => { localStorage.removeItem('adminToken'); adminToken = ''; showLogin() })
refreshBtn.addEventListener('click', loadStats)

adminPass.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click() })
adminEmail.addEventListener('keydown', e => { if (e.key === 'Enter') adminPass.focus() })
</script>
</body>
</html>
