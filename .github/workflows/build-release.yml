name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Install dependencies (fallback)
        run: npm install
        if: failure()

      - name: Generate icon
        run: node ../scripts/gen-icon.js

      - name: Encrypt API keys
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DROPBOX_CLIENT_ID: ${{ secrets.DROPBOX_CLIENT_ID }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node ../encrypt-keys.js

      - name: Build EXE
        run: npx electron-builder --win --publish=never
      
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: diamerna-exe
          path: desktop/dist/*.exe

  build-mobile:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Install dependencies (fallback)
        run: npm install
        if: failure()

      - name: Encrypt API keys
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DROPBOX_CLIENT_ID: ${{ secrets.DROPBOX_CLIENT_ID }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node ../encrypt-keys.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: diamerna-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk

  create-release:
    name: Create GitHub Release
    needs: [build-desktop, build-mobile]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: diamerna-exe
          path: release-assets/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: diamerna-apk
          path: release-assets/

      - name: Create source archive
        run: |
          zip -r release-assets/diamerna-source-${{ github.ref_name }}.zip \
            dev/ api/ desktop/package.json mobile/package.json \
            mobile/capacitor.config.json encrypt-keys.js scripts/ \
            package.json vercel.json .github/workflows/build-release.yml \
            -x "desktop/node_modules/*" "desktop/dist/*" \
            "mobile/node_modules/*" "mobile/android/*" \
            "dev/uploads/*" "*.db*" ".env*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            # DiaMerna v${{ github.ref_name }}
            
            ## Downloads
            - **Windows**: DiaMerna-Setup-${{ github.ref_name }}.exe
            - **Android**: DiaMerna-${{ github.ref_name }}.apk
            - **Source**: diamerna-source-${{ github.ref_name }}.zip
            
            ## ⚡ Build Notes
            API keys are encrypted with AES-256-GCM at build time.
            Set repository secrets (`OPENROUTER_API_KEY`, `DROPBOX_CLIENT_ID`, etc.) for automated builds.
            Source code contains **zero** API keys.
