name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'

      - name: Install dependencies
        run: npm install --ignore-scripts 2>$null; npm install 2>$null

      - name: Generate icon (fallback to copy)
        run: Copy-Item -Path "../dev/logo.jpeg" -Destination "icon.png" -Force

      - name: Encrypt API keys
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'YOUR_OPENROUTER_API_KEY_HERE' }}
          DROPBOX_CLIENT_ID: ${{ secrets.DROPBOX_CLIENT_ID || '' }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET || '' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || '' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || '' }}
        run: node ../encrypt-keys.js

      - name: Build EXE (portable - no signing)
        run: npx electron-builder --config.extraResources='[{"from":"../dev","to":"webapp","filter":["**/*"]}]' --config.win.target='portable' --config.win.certificateFile='' --config.win.certificatePassword='' --config.win.signAndEditExecutable=false 2>$null
        continue-on-error: true

      - name: Fallback - zip unpacked app
        if: failure()
        run: |
          npx electron-builder --dir 2>$null
          if (Test-Path "dist/win-unpacked") {
            Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "dist/DiaMerna-Portable-windows-x64.zip" -Force
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: diamerna-exe
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: diamerna-exe
          path: release-assets/

      - name: Create source archive (no API keys)
        run: |
          zip -r release-assets/diamerna-source-${{ github.ref_name }}.zip \
            dev/ api/ server/ desktop/package.json desktop/preload.js desktop/main.js \
            mobile/package.json mobile/capacitor.config.json encrypt-keys.js scripts/ \
            package.json vercel.json .github/workflows/build-release.yml \
            -x "desktop/node_modules/*" "desktop/dist/*" \
            "mobile/node_modules/*" "mobile/android/*" \
            "server/node_modules/*" "server/data/*" \
            "dev/uploads/*" "*.db*" ".env*" "desktop/encrypted-keys.json" "desktop/icon.png"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            # DiaMerna ${{ github.ref_name }}
            
            ## 🔗 Unified Server Architecture
            All platforms (Web / Windows EXE / Android APK) sync to **one shared backend server**.
            All data is stored persistently in SQLite (better-sqlite3) with WAL mode.
            
            ## 📥 Downloads
            | Platform | File |
            |---|---|
            | Windows | DiaMerna-Portable-windows-x64.zip or .exe |
            | Source | diamerna-source-${{ github.ref_name }}.zip |
            
            ## 📱 Android APK
            Build locally: `cd mobile && npm install && npm run build:apk`
            Requires Android SDK. See `mobile/README.md` for instructions.
            
            ## 🚀 Deploy Server
            Deploy `server/` on Render/Railway/Fly.io with persistent volume.
            Set `PERSISTENT_SERVER_URL` on Vercel to use it as API proxy.
            
            ## 🔐 Security
            API keys are encrypted with AES-256-GCM at build time.
            Source code contains **zero** API keys.
            Set repository secrets for automated builds.
