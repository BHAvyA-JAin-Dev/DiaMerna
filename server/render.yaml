# DiaMerna — Render Deployment Config
# Creates a persistent Web Service with disk volume

services:
  - type: web
    name: diamerna-server
    env: node
    region: oregon
    buildCommand: npm ci --omit=dev
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3030"
      - key: DB_DIR
        value: /data
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DROPBOX_CLIENT_ID
        sync: false
      - key: DROPBOX_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: diamerna-data
      mountPath: /data
      sizeGB: 1
